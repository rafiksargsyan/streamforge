services:
  backend:
    image: rsargsyan/streamforge-backend:latest
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "minio.local:host-gateway"
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_VIRTUAL_HOST: ${RABBITMQ_VIRTUAL_HOST}
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE:-streamforge-queue}
      RABBITMQ_TOPIC_EXCHANGE_NAME: ${RABBITMQ_TOPIC_EXCHANGE_NAME:-streamforge-exchange}
      RABBITMQ_ROUTING_KEY: ${RABBITMQ_ROUTING_KEY:-streamforge-jobs}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_REGION: ${S3_REGION:-eu-central-003}
      S3_ENDPOINT: ${S3_ENDPOINT:-https://s3.eu-central-003.backblazeb2.com}
      S3_BUCKET: ${S3_BUCKET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
    ports:
      - "${BACKEND_PORT:-8094}:8080"

  web-ui:
    image: rsargsyan/streamforge-web-ui:latest
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
      VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
      VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
      VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
      VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
      VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
    ports:
      - "${FRONTEND_PORT:-5176}:80"
    depends_on:
      - backend
